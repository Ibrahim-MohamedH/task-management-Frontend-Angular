<div class="min-h-100 flex items-center lg:w-xl md:w-lg sm:w-md">
  <form [formGroup]="form" (submit)="submit()">
    <app-tf-card>
    <div card-header>
      <h2 class="text-2xl text-center font-bold text-green-800 dark:text-green-400">{{"Sign up" | translate}}</h2>
    </div>
    @if(errorMessage()){
        <app-tf-alert alertType="danger" textClass="text-lg!" alertClass="mb-3" [closable]="true">
         {{ translate.getCurrentLang() == "en" ? errorMessage().en : errorMessage().ar }}
      </app-tf-alert>
      }
    <div class="flex flex-wrap gap-y-3">
      <div class="w-full">
        <app-tf-input [label]="'Name' | translate" type="text" [placeholder]="'User Name' | translate"
        formControlName="name"
        [required]="true"
        [errorMessage]="validationService.getErrorMessage(form,'name', 'Name', apiErrors)"
        [isValid]="validationService.isValid(form,'name')"
        ></app-tf-input>
      </div>
      <div class="w-full">
        <app-tf-input [label]="'Email' | translate" type="email" [placeholder]="'Email Address' | translate"
        formControlName="email"
        [required]="true"
        [errorMessage]="validationService.getErrorMessage(form,'email', 'Email', apiErrors)"
        [isValid]="validationService.isValid(form,'email')"
        ></app-tf-input>
      </div>
      <div class="w-full">
        <app-tf-input [label]="'Password' | translate" type="password"
        formControlName="password"
        [required]="true"
        [showMeter]="true"
        [errorMessage]="validationService.getErrorMessage(form,'password', 'Password', apiErrors)"
        [isValid]="validationService.isValid(form,'password')"></app-tf-input>
      </div>
      <div class="w-full">
        <app-tf-input [label]="'Password Confirmation' | translate" type="password"
        formControlName="confirmPassword"
        [required]="true"
        [errorMessage]="validationService.getErrorMessage(form,'confirmPassword', 'Password Confirmation', apiErrors)"
        [isValid]="validationService.isValid(form,'confirmPassword')"></app-tf-input>
      </div>
      <div class="w-full">
        <app-tf-button
        type="submit"
        labelClass="text-xl"
        [loading]="loading()"
        [disabled]="!form.valid"
        [label]="'Register' | translate"
        icon="circleCheckRegular"
        iconClass="text-xl"
        ></app-tf-button>
        <p class="text-center">
          {{"Don't have an account?" | translate}}
          <a class="text-brand font-bold" routerLink="/auth/login">{{"Sign in" | translate}}</a>
        </p>
      </div>
    </div>
  </app-tf-card>
  </form>
</div>
